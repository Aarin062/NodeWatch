# =============================================================================
# datasets.yaml — per-dataset configuration
# -----------------------------------------------------------------------------
# The ETL layer reads these entries to locate raw data, map columns into the
# canonical schema, and sanity-check class balance.
#
# Canonical schema (transfer / bipartite datasets):
#   nodes_accounts:      account_id, [attributes...]
#   edges_transactions:  transaction_id, source_account, dest_account, amount,
#                        timestamp, label, [tx_type, category, alert_type, ...]
#   The prediction unit is ONE transaction (one edge).
# =============================================================================

# Root of the downloaded raw datasets (external to the repo; data/ is gitignored).
raw_root: "C:/Users/Aarin Bhatta/OneDrive/Desktop/Projects/erp datasets"

# Where canonical node/edge files are written (resolved relative to repo root).
processed_root: "data/processed"

datasets:

  # ---- Tier 1: IBM AML simulation — the decisive topology testbed ----------
  ibm_aml:
    kind: transfer                       # account -> account transfers
    raw:
      transactions: "erp_fraud_data_4(ibm_aml_sim)/transactions.csv"
      accounts: "erp_fraud_data_4(ibm_aml_sim)/accounts.csv"   # node attributes
      alerts: "erp_fraud_data_4(ibm_aml_sim)/alerts.csv"       # fraud typology (eval only)
    schema:
      tx_id: TX_ID
      source: SENDER_ACCOUNT_ID
      dest: RECEIVER_ACCOUNT_ID
      amount: TX_AMOUNT
      timestamp: TIMESTAMP               # integer day counter, 0..199
      tx_type: TX_TYPE
      label: IS_FRAUD
      alert_id: ALERT_ID
    time_unit: day
    expected_fraud_rate: 0.0013          # verified by the ETL audit step
    topology:
      window: 7                          # trailing days of history the as-of engine sees
      max_cycle_len: 6                   # detect cycles up to this many edges

  # ---- Tier 1: BankSim — sparse bipartite control --------------------------
  banksim:
    kind: bipartite                      # customer -> merchant (no cycles possible)
    quote_char: "'"                      # raw values are single-quote wrapped
    raw:
      transactions: "erp_fraud_data_3(bankSim)/bs140513_032310.csv"
    schema:
      source: customer
      dest: merchant
      amount: amount
      timestamp: step                    # integer day counter, 0..179
      category: category
      label: fraud
    time_unit: step
    expected_fraud_rate: 0.0121
    topology:
      window: 7                          # bipartite control: in_cycle MUST be 0 everywhere
      max_cycle_len: 6

  # ---- Tier 2: PaySim — mobile-money transfer simulator --------------------
  # 6.36M transfers over 30 simulated days (step = 1 hour). Accounts are
  # customers ("C...") and merchants ("M..."); merchants are pure sinks, so the
  # graph is "mostly bipartite" — denser than BankSim, sparser than IBM AML.
  # Fraud occurs only in TRANSFER + CASH_OUT (carried via tx_type). The broken
  # `isFlaggedFraud` column is ignored; `isFraud` is the ground-truth label.
  paysim:
    kind: transfer
    raw:
      transactions: "erp_fraud_data_5(mobile)/PS_20174392719_1491204439457_log.csv"
    schema:
      source: nameOrig
      dest: nameDest
      amount: amount
      timestamp: step                    # integer hour counter, 1..743
      tx_type: type                      # PAYMENT / TRANSFER / CASH_OUT / ...
      label: isFraud
    time_unit: step
    expected_fraud_rate: 0.0013          # ~8.2k frauds / 6.36M txns
    topology:
      window: 24                         # 1 day (step = hour); near-forest, weak topology expected
      max_cycle_len: 6

  # ---- Tier 2: SAP Würzburg — the genuine ERP double-entry ledger ----------
  # Real SAP postings (RBKP/RSEG/BKPF/BSEG joined), German headers. There are NO
  # source/dest columns — the graph is DERIVED: each line item is one edge from
  # its document (Belegnummer) to the G/L account it posts to (Hauptbuchkonto).
  # => Document↔Account BIPARTITE model (kind: erp_ledger). Prediction unit =
  # one line item. Tiny, dense entity graph (~25 G/L accounts), so the topology
  # signal is expected to be weak — we report its contribution honestly.
  #
  # Data spans 5 independent ERPsim runs (fraud_1..3 carry injected frauds;
  # normal_1..2 are clean). Timestamps are TIME-ONLY (HH:MM:SS), so the canonical
  # `timestamp` is synthetic: run_index * 1e6 + seconds-since-midnight. This keeps
  # each run contiguous and preserves within-run order. `run_id` is carried per
  # edge — downstream MUST partition by run (no cross-run look-ahead).
  sap_wurzburg:
    kind: erp_ledger
    raw:
      ledger_files:
        - "erp_fraud_data_1(wurzburg)/erp_fraud_data/joint_datasets/fraud_1.csv"
        - "erp_fraud_data_1(wurzburg)/erp_fraud_data/joint_datasets/fraud_2.csv"
        - "erp_fraud_data_1(wurzburg)/erp_fraud_data/joint_datasets/fraud_3.csv"
        - "erp_fraud_data_1(wurzburg)/erp_fraud_data/joint_datasets/normal_1.csv"
        - "erp_fraud_data_1(wurzburg)/erp_fraud_data/joint_datasets/normal_2.csv"
    schema:
      document: Belegnummer                # SAP document number (BSEG)
      position: Position                   # line item within the document
      account: Hauptbuchkonto              # G/L account (100% filled, ~25 unique)
      account_type: Kontoart               # S=G/L  K=vendor  D=customer  M=material
      amount: "Betrag Hauswaehr"           # amount in local currency (100% filled)
      time: Erfassungsuhrzeit              # HH:MM:SS — within-run order only
      label: Label                         # multi-class; binary = (Label != NonFraud)
      tx_type: Transaktionsart             # Invoice / G/L posting / Material receipt...
      dc_indicator: "Soll/Haben-Kennz_"    # S=debit (Soll), H=credit (Haben)
      posting_key: Buchungsschluessel      # SAP posting key
      vendor: Kreditor                     # vendor id where present (~2% of lines)
    time_unit: synthetic                   # run_index*1e6 + seconds-since-midnight
    expected_fraud_rate: 0.0012            # 248 fraud lines / 200,629 (ETL-verified)
    partition_col: run_id                  # topology engine resets per run (no cross-run look-ahead)
    topology:
      window: null                         # unbounded WITHIN a run (runs are short, reset each run)
      max_cycle_len: 6

  # ---- Tier 3: FIFAR — DROPPED from Phase 1 (no graph) ---------------------
  # FIFAR / BAF is purely tabular application-fraud (34 features: income,
  # velocities, device_os, ...) with NO counterparty/account structure. There is
  # nothing to build a Shadow Graph from, so topology cannot be extracted and it
  # is excluded from Phase 1. (Its real purpose — learning-to-defer to human
  # experts — is orthogonal to our topology thesis.) Left unconfigured by design.
